<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Monitoring Aspirasi — MPK SMAN 1 Bangil</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #0f172a; --bg: #f1f5f9; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .header { text-align: center; margin-bottom: 30px; }
    .live-indicator { display: inline-flex; align-items: center; gap: 8px; background: #bbf7d0; color: #166534; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    
    .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 600px; width: 100%; box-sizing: border-box; }
    @media (min-width: 600px) { .grid-stats { grid-template-columns: repeat(4, 1fr); max-width: 800px; } }
    
    .card-stat { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border-top: 4px solid #64748b; }
    .card-stat.diterima { border-top-color: #f59e0b; }
    .card-stat.diproses { border-top-color: #3b82f6; }
    .card-stat.selesai { border-top-color: #10b981; }
    
    .card-stat h3 { margin: 0; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-stat .number { font-size: 36px; font-weight: 800; margin-top: 10px; display: block; transition: all 0.3s; }
    .back-btn { margin-top: 40px; text-decoration: none; color: #2563eb; font-weight: 500; font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="live-indicator"><div class="dot"></div> LIVE MONITORING</div>
    <h1 style="margin:5px 0;">Statistik Penanganan Aspirasi</h1>
    <p style="color:#64748b; margin:0;">Transparansi proses tindak lanjut oleh pengurus MPK SMAN 1 Bangil</p>
  </div>

  <div class="grid-stats">
    <div class="card-stat">
      <h3>Total Masuk</h3>
      <span class="number" id="stat-total">0</span>
    </div>
    <div class="card-stat diterima">
      <h3>Diterima</h3>
      <span class="number" id="stat-diterima" style="color: #d97706;">0</span>
    </div>
    <div class="card-stat diproses">
      <h3>Diproses</h3>
      <span class="number" id="stat-diproses" style="color: #2563eb;">0</span>
    </div>
    <div class="card-stat selesai">
      <h3>Selesai</h3>
      <span class="number" id="stat-selesai" style="color: #15803d;">0</span>
    </div>
  </div>

  <a href="index.html" class="back-btn">&larr; Kembali ke Form Pengisian Aspirasi</a>

  <script>
    // ** PENTING: ISI DENGAN KREDENSIAL SUPABASE ANDA **
    const SUPABASE_URL = 'https://pgfzuhwdacmuvwiguejj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZnp1aHdkYWNtdXZ3aWd1ZWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDc5MTcsImV4cCI6MjA5NjgyMzkxN30.I5qPNScCYdkWE67JP1iiN5yn24MJ036LRwn9st3xHUk';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener('DOMContentLoaded', function() {
      fetchStatistik();
      hubungkanRealtime();
    });

    // Mengambil data agregat dari VIEW database
    async function fetchStatistik() {
      try {
        const { data, error } = await _supabase
          .from('public_aspirasi_stats')
          .select('*')
          .single();

        if (error) throw error;

        if (data) {
          bikinEfekAnimasiTeks('stat-total', data.total || 0);
          bikinEfekAnimasiTeks('stat-diterima', data.diterima || 0);
          bikinEfekAnimasiTeks('stat-diproses', data.diproses || 0);
          bikinEfekAnimasiTeks('stat-selesai', data.selesai || 0);
        }
      } catch (err) {
        console.error('Gagal mengambil statistik:', err.message);
      }
    }

    // Sistem Radar Real-time (Mendengar mutasi data pada tabel utama)
    function hubungkanRealtime() {
      _supabase
        .channel('monitoring-stats-mpk')
        .on(
          'postgres_changes',
          { event: '*', schema: 'public', table: 'aspirasi' },
          (payload) => {
            console.log('Perubahan terdeteksi! Memperbarui visual...');
            fetchStatistik();
          }
        )
        .subscribe();
    }

    // Menambah efek kedip saat angka berubah secara live
    function bikinEfekAnimasiTeks(elementId, nilaiBaru) {
      const el = document.getElementById(elementId);
      if(el.textContent != nilaiBaru) {
        el.textContent = nilaiBaru;
        el.style.transform = "scale(1.2)";
        setTimeout(() => { el.style.transform = "scale(1)"; }, 300);
      }
    }
  </script>
</body>
</html>
